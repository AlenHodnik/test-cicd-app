services:
  web:
    image: ghcr.io/${GH_OWNER}/${GH_REPO}:latest
    container_name: test_cicd_web
    restart: unless-stopped
    environment:
      - APP_ENV=production
    ports:
      - "8088:8000"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 5
